<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Logare - Baza de date spital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary bg-gradient min-vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0 rounded-4" style="width: 430px;">
        <div class="card-body p-5">

            <div class="text-center mb-4">
                <h1 class="fw-bold text-primary mb-2">Logare</h1>
                <p class="text-muted mb-0">
                    Baza de date a Spitalului Municipal Central<br>
                    Sistem de gestionare medicală
                </p>
            </div>

            {% if mesaj %}
                <div class="alert alert-danger text-center">
                    {{ mesaj }}
                </div>
            {% endif %}

            <form method="post">

                <div class="mb-3">
                    <input type="text"
                           name="username"
                           class="form-control form-control-lg"
                           placeholder="Username"
                           required>
                </div>

                <div class="mb-4">
                    <input type="password"
                           name="parola"
                           class="form-control form-control-lg"
                           placeholder="Parolă"
                           required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                    Autentificare
                </button>

            </form>

            <div class="text-center mt-4 text-muted small">
                Acces permis doar personalului autorizat
            </div>

        </div>
    </div>

</body>
</html>
